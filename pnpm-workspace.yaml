# pnpm settings. On pnpm v11+, non-auth/registry settings live HERE (camelCase),
# not in .npmrc. Requires pnpm >= 10.16 for the minimumReleaseAge* keys — pinned via
# package.json "packageManager": "pnpm@11.5.0" (enable with `corepack enable`).

# --- Supply-chain hardening -------------------------------------------------
# Refuse to install any package version published less than 7 days ago.
# Unit is MINUTES: 7 * 24 * 60 = 10080. Applies to transitive deps too.
# Default since v11 is 1440 (1 day). Malicious releases are usually pulled
# from the registry within ~1 hour, so a multi-day cooldown is strong defense.
minimumReleaseAge: 10080

# Don't silently accept a package whose registry metadata lacks a `time` field
# (which would otherwise bypass the cooldown). Fail instead. Default: true (skip).
minimumReleaseAgeIgnoreMissingTime: false

# Fail resolution outright if no version satisfies the cooldown window, rather
# than quietly resolving to something unexpected.
minimumReleaseAgeStrict: true

# Allowlist for urgent security hotfixes that must bypass the cooldown, e.g.:
# minimumReleaseAgeExclude:
#   - some-package@1.2.3
# For a one-off override instead: pnpm install --config.minimumReleaseAge=0

# Pin the entire TipTap v3 tree to a single version published before the
# 2026-05-25 supply-chain cutoff. StarterKit's transitive extensions use caret
# ranges that would otherwise float to the newest 3.x (post-cutoff); overrides
# clamp every @tiptap/* package to 3.23.6 (published 2026-05-21).
overrides:
  "@tiptap/core": "3.23.6"
  "@tiptap/pm": "3.23.6"
  "@tiptap/react": "3.23.6"
  "@tiptap/starter-kit": "3.23.6"
  "@tiptap/extensions": "3.23.6"
  "@tiptap/extension-blockquote": "3.23.6"
  "@tiptap/extension-bold": "3.23.6"
  "@tiptap/extension-bullet-list": "3.23.6"
  "@tiptap/extension-code": "3.23.6"
  "@tiptap/extension-code-block": "3.23.6"
  "@tiptap/extension-document": "3.23.6"
  "@tiptap/extension-dropcursor": "3.23.6"
  "@tiptap/extension-gapcursor": "3.23.6"
  "@tiptap/extension-hard-break": "3.23.6"
  "@tiptap/extension-heading": "3.23.6"
  "@tiptap/extension-horizontal-rule": "3.23.6"
  "@tiptap/extension-italic": "3.23.6"
  "@tiptap/extension-link": "3.23.6"
  "@tiptap/extension-list": "3.23.6"
  "@tiptap/extension-list-item": "3.23.6"
  "@tiptap/extension-list-keymap": "3.23.6"
  "@tiptap/extension-ordered-list": "3.23.6"
  "@tiptap/extension-paragraph": "3.23.6"
  "@tiptap/extension-strike": "3.23.6"
  "@tiptap/extension-text": "3.23.6"
  "@tiptap/extension-underline": "3.23.6"

# --- General ----------------------------------------------------------------
# Honor engines.node / engines.pnpm in package.json.
engineStrict: true
# Auto-install peer dependencies (npm v7+ behavior; pnpm v11 default is already true).
autoInstallPeers: true

# Lockdown of which deps may run install/build scripts. msw is a transitive dev
# dependency we don't use; its postinstall (service-worker setup) is not needed.
allowBuilds:
  msw: false
